  <path d="M128 48 C128 48 72 128 72 164 C72 196.4 97.6 224 128 224 C132 224 136 223.6 140 223 C116 218 96 196 96 168 C96 136 128 80 128 80 C128 80 120 96 116 116 C108 148 108 176 116 200 C100 190 88 174 88 156 C88 120 128 48 128 48Z" 
        fill="url(#shineGrad)"/>
